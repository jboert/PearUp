<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PearUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #222240;
      --border: #2a2a4a;
      --text: #e0e0e8;
      --text-muted: #6b6b8a;
      --accent: #7c5cbf;
      --input-bg: #16162a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    #header {
      padding: 16px 20px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-app-region: drag;
      padding-top: 36px; /* space for macOS traffic lights */
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #header .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    #header .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    #header .status .dot.connected { background: #4cd964; }
    #header .status .dot.disconnected { background: #666; }

    #header .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    #clear-btn:hover { color: #e06c75; background: rgba(224,108,117,0.1); }

    #room-tabs {
      display: none;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 2px;
      -webkit-app-region: no-drag;
      overflow-x: auto;
    }

    .room-tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-family: inherit;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .room-tab:hover {
      color: var(--text);
    }

    .room-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .room-badge {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 4px;
      vertical-align: middle;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.self {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.other {
      align-self: flex-start;
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }

    .msg .sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
      opacity: 0.9;
    }

    .msg .body {
      white-space: pre-wrap;
    }

    .msg .meta {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 3px;
      text-align: right;
    }

    .msg .sender-human::after {
      content: ' \1F464';
      font-size: 9px;
    }

    .msg .sender-claude::after {
      content: ' \1F916';
      font-size: 9px;
    }

    .msg .reply-ref {
      font-size: 11px;
      opacity: 0.6;
      border-left: 2px solid currentColor;
      padding-left: 6px;
      margin-bottom: 4px;
      font-style: italic;
    }

    .day-divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 0 6px;
    }

    .system-msg {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 0;
      font-style: italic;
    }

    #input-area {
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    #recipient-picker {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 11px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
      min-width: 80px;
    }

    #recipient-picker:focus {
      border-color: var(--accent);
    }

    #input-area input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    #input-area input:focus {
      border-color: var(--accent);
    }

    #input-area input::placeholder {
      color: var(--text-muted);
    }

    #input-area button {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    #input-area button:hover { opacity: 0.85; }
    #input-area button:active { opacity: 0.7; }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--text-muted);
      -webkit-app-region: no-drag;
    }

    #empty-state .icon { font-size: 48px; opacity: 0.3; }
    #empty-state .text { font-size: 14px; }

    .mention {
      background: rgba(124, 92, 191, 0.25);
      color: #b89aff;
      border-radius: 3px;
      padding: 0 2px;
      font-weight: 600;
    }

    .mention-me {
      background: rgba(124, 92, 191, 0.45);
      color: #d4c0ff;
    }

    #autocomplete {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 4px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 10;
    }

    .ac-item {
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    .ac-item:hover, .ac-item.active {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>PearUp</h1>
    <div class="actions">
      <div class="status">
        <span class="dot disconnected" id="status-dot"></span>
        <span id="status-text">connecting...</span>
      </div>
      <button id="clear-btn" title="Clear history">&#128465;</button>
    </div>
  </div>

  <div id="room-tabs"></div>
  <div id="messages"></div>

  <div id="input-area">
    <select id="recipient-picker" title="Send to">
      <option value="*">everyone</option>
    </select>
    <div style="flex:1;position:relative">
      <input type="text" id="msg-input" placeholder="Send a message to your Claudes..." autocomplete="off" style="width:100%">
      <div id="autocomplete"></div>
    </div>
    <button id="send-btn" title="Send">&#9654;</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
