<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PearUp Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e8;
      padding: 40px 36px;
      -webkit-app-region: drag;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6b6b8a; font-size: 13px; margin-bottom: 32px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b8ba8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e8;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 20px;
      -webkit-app-region: no-drag;
    }
    input:focus, textarea:focus { border-color: #7c5cbf; }
    input::placeholder, textarea::placeholder { color: #4a4a6a; }
    textarea { resize: none; height: 72px; font-size: 13px; }
    .hint { font-size: 11px; color: #6b6b8a; margin-top: -14px; margin-bottom: 20px; }
    button {
      width: 100%;
      background: #7c5cbf;
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <h1>PearUp</h1>
  <p class="subtitle">Pair up your Claudes across machines</p>

  <label>Machine Name</label>
  <input type="text" id="name" placeholder="e.g. mac, linux, windows" autocomplete="off" autofocus>

  <label>Room Phrase (optional)</label>
  <textarea id="room" placeholder="Paste 12-word phrase to join an existing room. Leave blank to create a new room."></textarea>
  <p class="hint">If this is your first machine, leave blank — a phrase will be generated for you.</p>

  <button id="go" disabled>Start PearUp</button>

  <script>
    const nameInput = document.getElementById('name')
    const roomInput = document.getElementById('room')
    const btn = document.getElementById('go')

    nameInput.addEventListener('input', () => {
      btn.disabled = !nameInput.value.trim()
    })

    btn.addEventListener('click', () => {
      window.pearup.completeSetup({
        name: nameInput.value,
        room: roomInput.value
      })
    })

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && nameInput.value.trim()) {
        window.pearup.completeSetup({
          name: nameInput.value,
          room: roomInput.value
        })
      }
    })
  </script>
</body>
</html>
